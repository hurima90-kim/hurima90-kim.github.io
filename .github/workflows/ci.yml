name: CI

on:
  push:
    branches: [develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 빌드 먼저 실행 - .cache/gatsby-types.d.ts 생성 (Queries 네임스페이스 포함)
      - run: npm run build
        env:
          NODE_ENV: production

      # TypeScript 타입 체크 (빌드 후 gatsby-types.d.ts 존재)
      - run: npm run typecheck

      # ESLint
      - run: npx eslint src --ext .ts,.tsx

      # Lighthouse CI (빌드 결과물 재사용)
      - name: Start Gatsby serve
        run: npm run serve &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:9000 --timeout 60000

      - uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./.lighthouserc.json
          urls: |
            http://localhost:9000
          uploadArtifacts: true
          temporaryPublicStorage: true
